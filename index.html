<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Командное Казино</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root { --bg: #0f172a; --card: #1e293b; --acc: #3b82f6; --ok: #10b981; --err: #ef4444; --text: #e2e8f0; }
    body { margin:0; font-family:system-ui,sans-serif; background:var(--bg); color:var(--text); padding:20px; }
    .container { max-width:800px; margin:0 auto; }
    .btn { background:var(--acc); color:#fff; border:none; padding:12px 24px; border-radius:8px; cursor:pointer; font-size:16px; font-weight:500; transition:0.2s; }
    .btn:disabled { opacity:0.4; cursor:not-allowed; }
    .btn:hover:not(:disabled) { filter: brightness(1.1); }
    .card { background:var(--card); padding:20px; border-radius:12px; margin-bottom:20px; }
    .tabs { display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap; }
    .tab { background:#334155; padding:8px 16px; border-radius:20px; cursor:pointer; user-select: none; }
    .tab.active { background:var(--acc); }
    .wheel-container { position:relative; width:200px; height:200px; margin:20px auto; }
    .wheel { width:100%; height:100%; border-radius:50%; background:conic-gradient(#3b82f6 0deg 36deg, #10b981 36deg 108deg, #f59e0b 108deg 180deg, #8b5cf6 180deg 252deg, #ef4444 252deg 324deg, #3b82f6 324deg 360deg); transition:transform 4s cubic-bezier(0.25,0.1,0.25,1); box-shadow:0 0 20px rgba(0,0,0,0.5); }
    .pointer { position:absolute; top:-10px; left:50%; transform:translateX(-50%); width:0; height:0; border-left:15px solid transparent; border-right:15px solid transparent; border-top:20px solid #fff; z-index:2; }
    .task { background:#334155; padding:12px; margin:8px 0; border-radius:8px; display:flex; justify-content:space-between; align-items:center; flex-direction:column; gap:8px; }
    .status { font-size:12px; padding:4px 8px; border-radius:12px; font-weight:500; }
    .active { background:#f59e0b; color:#000; } .submitted { background:#3b82f6; } .completed { background:var(--ok); color:#000; } .rejected { background:var(--err); }
    input { width:100%; padding:10px; border-radius:8px; border:1px solid #475569; background:#0f172a; color:#fff; margin:8px 0; box-sizing:border-box; }
    .hidden { display:none !important; }
    table { width:100%; border-collapse:collapse; } th,td { padding:10px; border-bottom:1px solid #475569; text-align:left; }
    .error-msg { background:#ef4444; color:#fff; padding:10px; border-radius:8px; margin-top:10px; display:none; text-align:left; font-size:14px; }
    .refresh-btn { background:transparent; border:1px solid #475569; color:#94a3b8; padding:4px 10px; border-radius:6px; cursor:pointer; font-size:12px; margin-left:10px; }
    .refresh-btn:hover { border-color:#94a3b8; color:#e2e8f0; }
  </style>
</head>
<body>
  <div class="container">
    <div id="loading" style="text-align:center; padding:50px;">⏳ Загрузка системы...</div>
    
    <div id="auth-screen" class="hidden" style="text-align:center; padding:50px;">
      <h1>🎰 Командное Казино</h1>
      <p>Введите логин и пароль</p>
      <input type="email" id="login-email" placeholder="Email">
      <input type="password" id="login-pass" placeholder="Пароль">
      <button class="btn" id="login-btn" onclick="handleLogin()">Войти</button>
      <div id="error-box" class="error-msg"></div>
    </div>

    <div id="app" class="hidden">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2>👤 <span id="user-name">...</span></h2>
        <span style="background:#334155; padding:6px 12px; border-radius:12px;">💰 <span id="chips">0</span></span>
        <button class="btn" style="background:#475569; padding:6px 12px; font-size:14px;" onclick="logout()">🚪 Выйти</button>
      </div>
      
      <div class="tabs">
        <div class="tab active" onclick="switchTab('roulette', this)">🎡 Рулетка</div>
        <div class="tab" onclick="switchTab('tasks', this)">📋 Задания</div>
        <div class="tab" onclick="switchTab('leaderboard', this)">🏆 Турнирка</div>
        <div class="tab hidden" id="nav-admin-btn" onclick="switchTab('admin', this)">⚙️ Админ</div>
      </div>

      <div id="roulette-tab" class="card">
        <h3>Крутите колесо</h3>
        <div class="wheel-container"><div class="pointer"></div><div class="wheel" id="wheel"></div></div>
        <p id="spin-status" style="color:#94a3b8;"></p>
        <button class="btn" id="spin-btn" style="display:block; margin:0 auto;" onclick="handleSpin()">КРУТИТЬ</button>
      </div>
      <div id="tasks-tab" class="hidden card"><h3>Ваши задания</h3><div id="tasks-list"></div></div>
      <div id="leaderboard-tab" class="hidden card">
        <h3>Турнирная таблица <button class="refresh-btn" onclick="loadLeaderboard()">🔄 Обновить</button></h3>
        <table><thead><tr><th>Место</th><th>Имя</th><th>Выполнено</th></tr></thead><tbody id="lb-body"></tbody></table>
      </div>
      <div id="admin-tab" class="hidden card">
        <h3>Панель админа <button class="refresh-btn" onclick="loadAdminQueue()">🔄 Обновить очередь</button></h3>
        <h4>Заявки на проверку</h4><div id="admin-queue"></div>
        <hr style="border-color:#334155; margin:20px 0;">
        <h4>Ручное управление</h4>
        <input type="text" id="admin-uid" placeholder="ID пользователя (UUID)">
        <input type="number" id="admin-amount" placeholder="Кол-во фишек">
        <button class="btn" onclick="handleAddChips()">Начислить фишки</button>
        <button class="btn" style="background:#f59e0b; margin-left:10px;" onclick="handleResetSpin()">Сбросить кулдаун</button>
      </div>
    </div>
  </div>

  <script>
    const SB_URL = 'https://hjjklimzsnkxljghkrdu.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhqamtsaW16c25reGxqZ2hrcmR1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NzA2OTcsImV4cCI6MjA5MTE0NjY5N30.YJLJ_0S409DYD-mAS71AmCNy7klwR-cMZzXEgZU5-R0';
    let db = null, currentUser = null;

    function showScreen(id) {
      ['loading','auth-screen','app'].forEach(s => document.getElementById(s).classList.add('hidden'));
      document.getElementById(id).classList.remove('hidden');
    }

    function showError(txt) { showScreen('auth-screen'); const b=document.getElementById('error-box'); b.textContent=txt; b.style.display='block'; }

    function updateSpinUI(nextAt, activeCount) {
      const btn = document.getElementById('spin-btn'), txt = document.getElementById('spin-status');
      const now = new Date(), next = nextAt ? new Date(nextAt) : new Date(0);
      const canSpin = (activeCount === 0) || (next <= now);
      txt.textContent = canSpin ? '✅ Рулетка доступна!' : `⏳ Доступно через: ${Math.ceil((next-now)/3600000)} ч. или сдайте задания`;
      btn.disabled = !canSpin;
    }

    async function loadProfile() {
      try {
        const { data: p, error } = await db.from('profiles').select('*').eq('id', currentUser.id).single();
        if (error || !p) throw new Error('Профиль не найден.');
        document.getElementById('user-name').textContent = p.name || 'Участник';
        document.getElementById('chips').textContent = p.chips || 0;
        const role = (p.role||'').trim().toLowerCase();
        document.getElementById('nav-admin-btn').classList.toggle('hidden', role !== 'admin');
        
        const { data: active } = await db.from('user_tasks').select('id').eq('user_id', currentUser.id).in('status', ['active','submitted']);
        updateSpinUI(p.next_spin_at, active?.length || 0);
        showScreen('app');
        loadTasks();
        if (role === 'admin') loadAdminQueue();
      } catch(e) { showError('❌ ' + e.message); }
    }

    async function handleSpin() {
      const btn = document.getElementById('spin-btn');
      btn.disabled = true; btn.textContent = '⏳ Крутим...';
      try {
        const { data, error } = await db.rpc('spin_wheel', { p_user_id: currentUser.id });
        if (error) throw error;
        if (data?.error) throw new Error(data.error);
        document.getElementById('wheel').style.transform = `rotate(${1440 + (data.result/100)*360}deg)`;
        setTimeout(() => {
          alert(`🎉 Выпало: ${data.result}\n📋 Назначено заданий: ${data.tasks}`);
          btn.textContent = 'КРУТИТЬ';
          loadProfile();
        }, 4100);
      } catch(e) { alert('❌ Ошибка: ' + e.message); btn.disabled = false; btn.textContent = 'КРУТИТЬ'; }
    }

    async function loadTasks() {
      const { data, error } = await db.from('user_tasks').select('*, tasks_pool(title, description)').eq('user_id', currentUser.id).order('created_at', {ascending:false});
      const list = document.getElementById('tasks-list'); list.innerHTML = '';
      if (error) { list.innerHTML = `<p style="color:var(--err)">Ошибка: ${error.message}</p>`; return; }
      if (!data?.length) { list.innerHTML = '<p style="color:#94a3b8">Нет заданий. Крутите колесо!</p>'; return; }
      data.forEach(t => {
        list.innerHTML += `<div class="task"><div><strong>${t.tasks_pool?.title||'Задание'}</strong><br><small>${t.tasks_pool?.description||''}</small></div><span class="status ${t.status}">${t.status}</span></div>`;
        if(t.status==='active') list.innerHTML += `<textarea id="ans-${t.id}" style="width:100%;padding:8px;margin:8px 0;border-radius:6px;border:1px solid #475569;background:#0f172a;color:#fff;" placeholder="Ваш ответ..."></textarea><button class="btn" onclick="submitTask('${t.id}')">Отправить</button><hr>`;
      });
    }

    async function submitTask(id) {
      const ans = document.getElementById(`ans-${id}`).value.trim();
      if(!ans) { alert('Введите ответ'); return; }
      await db.from('user_tasks').update({ status:'submitted', answer:ans }).eq('id',id);
      loadProfile(); loadTasks();
    }

    async function loadLeaderboard() {
      const { data: tasks, error: tErr } = await db.from('user_tasks').select('user_id').eq('status','completed');
      const { data: profiles, error: pErr } = await db.from('profiles').select('id, name');
      const tb = document.getElementById('lb-body');
      if (tErr || pErr) { tb.innerHTML = `<tr><td colspan="3" style="color:var(--err)">Ошибка загрузки: ${tErr?.message || pErr?.message}</td></tr>`; return; }
      if (!profiles?.length) { tb.innerHTML = '<tr><td colspan="3">Нет пользователей</td></tr>'; return; }
      
      const counts = profiles.map(p => ({ name:p.name, done: (tasks||[]).filter(t=>t.user_id===p.id).length }))
                             .sort((a,b)=>b.done-a.done);
      tb.innerHTML = counts.map((u,i) => `<tr><td>${i+1}</td><td>${u.name}</td><td>${u.done}</td></tr>`).join('');
    }

    async function loadAdminQueue() {
      const { data: tasks, error } = await db.from('user_tasks').select('*').eq('status','submitted').order('created_at', {ascending:false});
      const q = document.getElementById('admin-queue');
      if (error) { q.innerHTML = `<p style="color:var(--err)">Ошибка: ${error.message}</p>`; return; }
      if (!tasks?.length) { q.innerHTML = '<p style="color:#94a3b8">Нет заявок</p>'; return; }
      
      const userIds = [...new Set(tasks.map(t => t.user_id))];
      const { data: users } = await db.from('profiles').select('id, name').in('id', userIds);
      const names = {}; users?.forEach(u => names[u.id] = u.name || 'Пользователь');

      q.innerHTML = tasks.map(t => `
        <div class="task">
          <div><strong>${names[t.user_id]||'Пользователь'}</strong><br><small>Ответ: ${t.answer}</small></div>
          <div style="display:flex;gap:8px;">
            <button class="btn" style="background:var(--ok)" onclick="approveTask('${t.id}')">✅</button>
            <button class="btn" style="background:var(--err)" onclick="rejectTask('${t.id}')">❌</button>
          </div>
        </div>`).join('');
    }

    async function approveTask(id) {
      try {
        const { data: t } = await db.from('user_tasks').select('user_id').eq('id',id).single();
        await db.from('user_tasks').update({status:'completed'}).eq('id',id);
        const { error } = await db.rpc('increment_chips', { p_user_id: t.user_id, p_amount: 100 });
        if (error) throw error;
        alert('✅ Одобрено! +100 фишек.');
        loadAdminQueue(); loadProfile();
      } catch(e) { alert('❌ Ошибка: ' + e.message); }
    }
    async function rejectTask(id) {
      await db.from('user_tasks').update({status:'active'}).eq('id',id);
      loadAdminQueue(); loadProfile();
    }
    async function handleAddChips() {
      const uid = document.getElementById('admin-uid').value.trim();
      const amt = parseInt(document.getElementById('admin-amount').value);
      if(uid && amt) await db.rpc('increment_chips', { p_user_id: uid, p_amount: amt });
    }
    async function handleResetSpin() {
      const uid = document.getElementById('admin-uid').value.trim();
      if(uid) await db.from('profiles').update({next_spin_at:new Date(0).toISOString()}).eq('id',uid);
    }

    function switchTab(name, btn) {
      document.querySelectorAll('[id$="-tab"]').forEach(el => el.classList.add('hidden'));
      document.getElementById(name + '-tab').classList.remove('hidden');
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      if (btn) btn.classList.add('active');
      if (name === 'tasks') loadTasks();
      if (name === 'leaderboard') loadLeaderboard();
      if (name === 'admin') loadAdminQueue();
    }

    async function handleLogin() {
      const btn = document.getElementById('login-btn');
      const email = document.getElementById('login-email').value.trim();
      const pass = document.getElementById('login-pass').value;
      if(!email || !pass) { alert('Введите email и пароль'); return; }
      btn.disabled = true; btn.textContent = '⏳ Вход...';
      const { error } = await db.auth.signInWithPassword({ email, password: pass });
      if (error) { alert('❌ ' + error.message); btn.disabled = false; btn.textContent = 'Войти'; }
    }

    function logout() { db.auth.signOut(); }

    async function init() {
      if (SB_URL.includes('ВАШ_ПРОЕКТ') || SB_KEY === 'ВАШ_ANON_PUBLIC_KEY') { showError('❌ Не вставлены ключи Supabase (строки 8-9)'); return; }
      if (!window.supabase) { showError('❌ Скрипт не загрузился. Отключите AdBlock.'); return; }
      db = window.supabase.createClient(SB_URL, SB_KEY);

      db.auth.onAuthStateChange((event, session) => {
        if (event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED') { currentUser = session.user; loadProfile(); }
        else if (event === 'SIGNED_OUT') { currentUser = null; document.getElementById('login-btn').disabled = false; document.getElementById('login-btn').textContent = 'Войти'; showScreen('auth-screen'); }
      });

      const { data: session } = await db.auth.getSession();
      if (session) { currentUser = session.user; await loadProfile(); }
      else { showScreen('auth-screen'); }
    }
    init();
  </script>
</body>
</html>
